<!DOCTYPE html>
<html lang="fr" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sabrina · Ops Command Center</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/styles/tokens.css">
<link rel="stylesheet" href="/styles/base.css">
<link rel="stylesheet" href="/styles/components.css">
<link rel="stylesheet" href="/styles/today.css">
<link rel="stylesheet" href="/styles/drawer.css">
<link rel="stylesheet" href="/styles/health.css">
<link rel="stylesheet" href="/styles/clients.css">
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="login-screen" class="login-screen">
  <div class="login-card">
    <div class="login-brand">
      <div class="login-logo">S</div>
      <div class="login-title">Sabrina</div>
      <div class="login-subtitle">Ops Command Center</div>
    </div>

    <div class="login-form">
      <label class="field-label">Utilisateur</label>
      <div class="user-grid" id="user-grid">
        <!-- Boutons utilisateurs générés en JS -->
      </div>

      <label class="field-label">Mot de passe</label>
      <input type="password" id="pwd-input" class="field-input" placeholder="••••••••" autocomplete="current-password">

      <div class="login-error" id="login-error" hidden></div>

      <button class="btn-primary" id="login-btn">Connexion</button>
    </div>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="dashboard" hidden>

  <!-- HEADER -->
<header class="header">
  <div class="header-left">
    <div class="brand">
      <div class="brand-logo">S</div>
      <div class="brand-text">
        <span class="brand-name">Sabrina</span>
        <span class="brand-sep">/</span>
        <span class="brand-project">Meubles Bonito</span>
      </div>
    </div>
    <div class="status-pill" id="status-pill">
      <span class="status-dot"></span>
      <span class="status-label">LIVE</span>
    </div>
    <div class="sync-status" id="sync-status">
      <span class="sync-icon">↻</span>
      <span class="sync-text">Synchronisation...</span>
    </div>

    <span class="urgent-badge" id="urgent-count-badge" hidden></span>
  </div>
  <div class="header-right">
    <span class="user-pill" id="current-user">—</span>
    <button class="btn-icon" id="theme-btn" title="Changer le thème">🌙</button>
    <button class="btn-icon" id="refresh-btn" title="Rafraîchir">↻</button>
    <button class="btn-ghost" id="logout-btn">Déconnexion</button>
  </div>
</header>

  <!-- NAV -->
  <nav class="main-nav">
    <button class="nav-tab active" data-page="today">Today</button>
    <button class="nav-tab" data-page="clients">Clients</button>
    <button class="nav-tab" data-page="health">Health</button>
  </nav>

  <!-- CONTENT -->
  <main class="content">

    <!-- TODAY PAGE -->
    <div class="page active" id="page-today">
      <div class="page-header">
        <h1 class="page-title">Today</h1>
        <p class="page-subtitle">Actions prioritaires du jour</p>
      </div>
      <div class="page-body">
        <div class="empty-state">
          <div class="empty-icon">⏳</div>
          <div class="empty-title">Page Today</div>
          <div class="empty-desc">Sera construite au Lot 5. Pour l'instant, c'est un placeholder.</div>
        </div>
      </div>
    </div>

    <!-- CLIENTS PAGE -->
    <div class="page" id="page-clients">
      <div class="page-header">
        <h1 class="page-title">Clients</h1>
        <p class="page-subtitle">Recherche et fiches détaillées</p>
      </div>
      <div class="page-body">
        <!-- Filled by js/pages/clients.js -->
      </div>
    </div>

    <!-- HEALTH PAGE -->
    <div class="page" id="page-health">
      <div class="page-header">
        <h1 class="page-title">Health</h1>
        <p class="page-subtitle">Santé Sabrina · Erreurs · Signaux</p>
      </div>
      <div class="page-body">
        <!-- Filled by js/pages/health.js -->
      </div>
    </div>

  </main>

</div>

<script type="module" src="/js/main.js"></script>
</body>
</html>
